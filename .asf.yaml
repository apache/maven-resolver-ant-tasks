# see https://s.apache.org/asfyaml
github:
  description: "Apache Maven Artifact Resolver Ant Tasks"
  homepage: https://maven.apache.org/resolver-ant-tasks/
  labels:
    - java
    - build-management
    - apache-maven
    - maven
    - apache-ant
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  protected_branches:
    master: {}
  pull_requests:
    del_branch_on_merge: true
  features:
    issues: true

notifications:
  commits: commits@maven.apache.org
  issues: issues@maven.apache.org
  pullrequests: issues@maven.apache.org

project:
  metadata:
    key: maven-resolver-ant-tasks
    committee: maven
    name: Maven Resolver Ant Tasks
    description: The Maven Resolver Ant Tasks enable build scripts for Apache Ant 1.7+ to use Maven Artifact Resolver to resolve dependencies and install and deploy locally built artifacts.
    short_description: The Maven Resolver Ant Tasks enable build scripts for Apache Ant 1.7+ to use Maven Artifact Resolver to resolve dependencies and install and deploy locally built artifacts.
    homepage: https://maven.apache.org/resolver-ant-tasks/
    download_page: https://maven.apache.org/resolver-ant-tasks/download.cgi
    bug_database: https://maven.apache.org/resolver-ant-tasks/issue-management.html
    mailing_lists: https://maven.apache.org/resolver-ant-tasks/mailing-lists.html
    repositories:
      - https://github.com/apache/maven-resolver-ant-tasks.git
    categories:
      - build-management
    programming_languages:
      - Java
